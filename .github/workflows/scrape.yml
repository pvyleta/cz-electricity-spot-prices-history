name: Daily scrape

on:
  schedule:
    # Run at 14:00 UTC daily — OTE publishes next-day results in the morning CET,
    # so by 14:00 UTC the previous day's data should be available.
    - cron: "0 14 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape yesterday's data
        run: python scrape.py --yesterday

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) daily scrape"
          git push
